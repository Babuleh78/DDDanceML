version: '3.8'

services:
  ml-service:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LABELING_BACKEND=ollama
      - LABELING_MODEL_OLLAMA=qwen2.5:7b
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_CTX=512
      - OLLAMA_NUM_THREAD=4
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./ml-service/app:/app/app:ro
      - ./ml-service/.env:/app/.env:ro
      - ./ml-service/results:/app/results
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - ddd-network
    deploy:
      resources:
        limits:
          memory: 4G

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --concurrency=2 --loglevel=info -Q video_processing
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LABELING_BACKEND=ollama
      - LABELING_MODEL_OLLAMA=qwen2.5:7b
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_CTX=512
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./ml-service/app:/app/app:ro
      - ./ml-service/.env:/app/.env:ro
      - ./ml-service/results:/app/results
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - ddd-network
    deploy:
      resources:
        limits:
          memory: 8G  # воркер тяжелее — держит MediaPipe + Blender

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"   # только для отладки, в проде убрать
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ddd-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_CTX=512
    
    networks:
      - ddd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 300s

volumes:
  ollama_models:
    name: dddance_ollama_models
  redis_data:
    name: dddance_redis_data

networks:
  ddd-network:
    external: true
    name: ddd-network