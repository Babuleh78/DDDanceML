services:

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    volumes:
      - ./ml-service/app:/app/app:ro
      - ./ml-service/.env:/app/.env:ro
      - ./ml-service/results:/app/results
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ddd-network
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: >
      celery -A app.worker.celery_app worker
      --concurrency=2
      --loglevel=info
      -Q video_processing
    env_file:
      - .env
    volumes:
      - ./ml-service/app:/app/app:ro
      - ./ml-service/.env:/app/.env:ro
      - ./ml-service/results:/app/results
      - ./secrets:/secrets
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ddd-network
    deploy:
      resources:
        limits:
          memory: 8G

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ddd-network
    restart: unless-stopped

volumes:
  redis_data:
    name: dddance_redis_data
  hf_cache:
    name: dddance_hf_cache

networks:
  ddd-network:
    name: ddd-network
    external: true
