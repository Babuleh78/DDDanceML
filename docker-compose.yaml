services:

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./ml-service/app:/app/app:ro
      - ./ml-service/.env:/app/.env:ro
      - ./ml-service/results:/app/results
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ml-internal
    deploy:
      resources:
        limits:
          # DECISION: raised from 512M — the web process loads torch +
          # sentence-transformers (DanceRecommender singleton) at startup, whose
          # peak RSS is ~1.5-2G. 512M caused OOM-kill (exit 137) during model
          # load. Tune down if the recommender is disabled.
          memory: 10G

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.worker.celery_app worker
      --concurrency=2
      --loglevel=info
      -Q video_processing,background
    env_file:
      - .env
    volumes:
      - ./ml-service/app:/app/app:ro
      - ./ml-service/.env:/app/.env:ro
      - ./ml-service/results:/app/results
      - ./secrets:/secrets
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -d celery@$$HOSTNAME >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ml-internal
    deploy:
      resources:
        limits:
          memory: 8G

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ml-internal
    restart: unless-stopped

volumes:
  redis_data:
    name: dddance_redis_data
  hf_cache:
    name: dddance_hf_cache

networks:
  ml-internal:
    name: ml-internal
    external: true